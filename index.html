<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dignif-Eye - 실시간 보행 분석</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a1a;
  color: #e0e0f0;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
  overflow: hidden;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}
#container {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}
#video-canvas-wrap {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  transform-origin: center center;
  will-change: transform;
}
#video {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
}
#canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  transform: scaleX(-1);
}

/* 상단 헤더 */
#header {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 12px 16px;
  background: linear-gradient(to bottom, rgba(10,10,26,0.85), transparent);
  z-index: 10;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
#header h1 {
  font-size: 18px;
  font-weight: 600;
  color: #64c8ff;
  letter-spacing: 1px;
}
#fps-badge {
  font-size: 11px;
  color: #888;
  background: rgba(255,255,255,0.1);
  padding: 2px 8px;
  border-radius: 10px;
}

/* 상태 바 (상단 4px) */
#status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  z-index: 20;
  transition: background 0.3s;
}

/* 줌 레벨 표시 */
#zoom-indicator {
  position: absolute;
  top: 60px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  color: #fff;
  padding: 4px 14px;
  border-radius: 16px;
  font-size: 14px;
  font-weight: 600;
  z-index: 15;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
#zoom-indicator.show { opacity: 1; }

/* 분석 패널 */
#panel {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(10,10,26,0.92), rgba(10,10,26,0.7), transparent);
  padding: 60px 16px 20px;
  z-index: 10;
}
.metric-row {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  font-size: 16px;
}
.metric-label { color: #a0a0c0; }
.metric-value { color: #dde; font-weight: 500; font-variant-numeric: tabular-nums; }

.section-title {
  font-size: 14px;
  color: #64c8ff;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin: 10px 0 4px;
  padding-top: 6px;
  border-top: 1px solid rgba(100,200,255,0.15);
}

/* 속도 대형 표시 */
#speed-display {
  text-align: center;
  margin: 6px 0 4px;
}
#speed-value {
  font-size: 44px;
  font-weight: 700;
  letter-spacing: -1px;
}
#speed-unit {
  font-size: 18px;
  color: #888;
  margin-left: 4px;
}
#speed-label {
  font-size: 16px;
  font-weight: 600;
  margin-top: 2px;
}

/* 시작 화면 */
#start-screen {
  position: absolute;
  inset: 0;
  background: #0a0a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  transition: opacity 0.5s;
}
#start-screen.hidden { opacity: 0; pointer-events: none; }
#start-screen h1 { font-size: 28px; color: #64c8ff; margin-bottom: 8px; }
#start-screen p { color: #888; font-size: 15px; margin-bottom: 30px; }
#start-btn {
  background: #64c8ff;
  color: #0a0a1a;
  border: none;
  padding: 14px 40px;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#start-btn:active { background: #4ab0e8; }
#loading-text {
  color: #888;
  font-size: 14px;
  margin-top: 16px;
  display: none;
}

/* 가이드 오버레이 */
#guide {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
  opacity: 0;
  transition: opacity 0.5s;
  pointer-events: none;
}
#guide.show { opacity: 1; }
#guide p {
  color: rgba(255,255,255,0.7);
  font-size: 15px;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}

/* WHO-ICOPE 속도 게이지 */
#speed-gauge {
  height: 6px;
  border-radius: 3px;
  margin: 6px 0;
  position: relative;
  background: linear-gradient(to right, #ff3333 0%, #ff3333 30%, #ff8800 30%, #ff8800 40%, #ffcc00 40%, #ffcc00 50%, #32cd32 50%, #32cd32 100%);
  overflow: visible;
}
#speed-marker {
  position: absolute;
  top: -3px;
  width: 4px; height: 12px;
  background: #fff;
  border-radius: 2px;
  transition: left 0.2s;
}

/* 분석 종료 버튼 */
#stop-btn {
  position: absolute;
  top: 50px; right: 16px;
  background: rgba(255,50,50,0.85);
  color: #fff;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  z-index: 15;
  display: none;
  -webkit-tap-highlight-color: transparent;
}
#stop-btn:active { background: rgba(200,30,30,0.9); }

/* 결과 화면 */
#result-screen {
  position: absolute;
  inset: 0;
  background: #0a0a1a;
  z-index: 200;
  display: none;
  flex-direction: column;
  align-items: center;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 16px 40px;
}
#result-screen.active {
  display: flex;
}
#result-screen h2 {
  font-size: 22px;
  color: #64c8ff;
  margin-bottom: 12px;
}
#result-canvas {
  max-width: 100%;
  border-radius: 10px;
  margin-bottom: 16px;
  background: #111;
}
#result-buttons {
  display: flex;
  gap: 12px;
  margin-top: 10px;
}
#result-buttons button {
  padding: 12px 28px;
  border-radius: 10px;
  font-size: 16px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#save-img-btn {
  background: #64c8ff;
  color: #0a0a1a;
}
#restart-btn {
  background: rgba(255,255,255,0.15);
  color: #e0e0f0;
}
</style>
</head>
<body>

<!-- 시작 화면 -->
<div id="start-screen">
  <h1>Dignif-Eye</h1>
  <p>실시간 스켈레톤 보행 분석</p>
  <button id="start-btn">카메라 시작</button>
  <div id="loading-text">MoveNet Lightning 로딩 중...</div>
</div>

<!-- 메인 화면 -->
<div id="container">
  <div id="status-bar"></div>
  <div id="video-canvas-wrap">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <div id="header">
    <h1>Dignif-Eye</h1>
    <span id="fps-badge">-- FPS</span>
  </div>

  <div id="zoom-indicator">1.0x</div>

  <div id="guide">
    <p>뒤로 물러서서 자연스럽게 걸어주세요</p>
  </div>

  <button id="stop-btn">분석 종료</button>

  <div id="panel">
    <div id="speed-display">
      <span id="speed-value">--</span><span id="speed-unit">m/s</span>
      <div id="speed-label">대기 중...</div>
    </div>
    <div id="speed-gauge"><div id="speed-marker" style="left:0%"></div></div>

    <div class="section-title">시공간 지표</div>
    <div class="metric-row"><span class="metric-label">분당 걸음수</span><span class="metric-value" id="m-cadence">--</span></div>
    <div class="metric-row"><span class="metric-label">보폭 시간</span><span class="metric-value" id="m-stride-time">--</span></div>
    <div class="metric-row"><span class="metric-label">보폭 길이</span><span class="metric-value" id="m-step-length">--</span></div>
    <div class="metric-row"><span class="metric-label">대칭성</span><span class="metric-value" id="m-symmetry">--</span></div>
    <div class="metric-row"><span class="metric-label">변동성</span><span class="metric-value" id="m-variability">--</span></div>
    <div class="metric-row"><span class="metric-label">측정 시간</span><span class="metric-value" id="m-duration">--</span></div>

    <div class="section-title">운동학 지표</div>
    <div class="metric-row"><span class="metric-label">체간 기울기</span><span class="metric-value" id="m-trunk">--</span></div>
    <div class="metric-row"><span class="metric-label">무릎 각도 (좌/우)</span><span class="metric-value" id="m-knee">--</span></div>
    <div class="metric-row"><span class="metric-label">고관절 각도 (좌/우)</span><span class="metric-value" id="m-hip">--</span></div>

    <div class="section-title">보행 주기</div>
    <div class="metric-row"><span class="metric-label">입각기</span><span class="metric-value" id="m-stance">--</span></div>
    <div class="metric-row"><span class="metric-label">유각기</span><span class="metric-value" id="m-swing">--</span></div>
    <div class="metric-row"><span class="metric-label">양하지 지지</span><span class="metric-value" id="m-double">--</span></div>
  </div>
</div>

<!-- 결과 화면 -->
<div id="result-screen">
  <h2>Dignif-Eye 분석 결과</h2>
  <canvas id="result-canvas"></canvas>
  <div id="result-buttons">
    <button id="save-img-btn">이미지 저장</button>
    <button id="restart-btn">다시 시작</button>
  </div>
</div>

<!-- TensorFlow.js + MoveNet -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script>
// ── COCO 17 Keypoint Indices ──
const NOSE=0, L_EYE=1, R_EYE=2, L_EAR=3, R_EAR=4;
const L_SHOULDER=5, R_SHOULDER=6, L_ELBOW=7, R_ELBOW=8;
const L_WRIST=9, R_WRIST=10, L_HIP=11, R_HIP=12;
const L_KNEE=13, R_KNEE=14, L_ANKLE=15, R_ANKLE=16;

const SKELETON = [
  [NOSE,L_EYE],[NOSE,R_EYE],[L_EYE,L_EAR],[R_EYE,R_EAR],
  [L_SHOULDER,R_SHOULDER],
  [L_SHOULDER,L_ELBOW],[L_ELBOW,L_WRIST],
  [R_SHOULDER,R_ELBOW],[R_ELBOW,R_WRIST],
  [L_SHOULDER,L_HIP],[R_SHOULDER,R_HIP],[L_HIP,R_HIP],
  [L_HIP,L_KNEE],[L_KNEE,L_ANKLE],
  [R_HIP,R_KNEE],[R_KNEE,R_ANKLE],
];

function getJointColor(idx) {
  if (idx <= 4)  return [200,200,200];
  if (idx <= 6)  return [50,180,255];
  if (idx <= 10) return [100,220,255];
  if (idx <= 12) return [50,255,50];
  if (idx <= 14) return [255,200,50];
  return [255,100,50];
}

// ── WHO-ICOPE 기준 ──
const SPEED_SEVERE = 0.6, SPEED_THRESHOLD = 0.8, SPEED_CAUTION = 1.0;
function getSpeedInfo(s) {
  if (s <= 0)            return { label: '대기 중...', color: '#888' };
  if (s < SPEED_SEVERE)  return { label: '심각',       color: '#ff3333' };
  if (s < SPEED_THRESHOLD) return { label: '경고',     color: '#ff6600' };
  if (s < SPEED_CAUTION) return { label: '주의',       color: '#ffcc00' };
  return                        { label: '정상',       color: '#32cd32' };
}

// ── Gait Analyzer (JS port) ──
class GaitAnalyzer {
  constructor() {
    this.bufferSize = 180;
    this.fps = 30;
    this.hipHistory = [];
    this.lAnkleY = [];
    this.rAnkleY = [];
    this.lAnkleX = [];
    this.rAnkleX = [];
    this.shoulderCX = [];
    this.kpBuffer = [];
    this.strideTimesHist = [];
    this.frameCount = 0;
    this.pxPerMeter = null;
    this.heightSamples = [];
  }

  update(kps) {
    this.frameCount++;
    if (!kps || kps.length < 17) return null;

    const lHip = kps[L_HIP], rHip = kps[R_HIP];
    const hipCx = (lHip.x + rHip.x) / 2;
    const hipCy = (lHip.y + rHip.y) / 2;

    this._push(this.hipHistory, [hipCx, hipCy]);
    this._push(this.lAnkleY, kps[L_ANKLE].y);
    this._push(this.rAnkleY, kps[R_ANKLE].y);
    this._push(this.lAnkleX, kps[L_ANKLE].x);
    this._push(this.rAnkleX, kps[R_ANKLE].x);
    this._push(this.shoulderCX, (kps[L_SHOULDER].x + kps[R_SHOULDER].x) / 2);
    this._push(this.kpBuffer, kps);

    this._calibrateHeight(kps);

    if (this.lAnkleY.length < 60) return null;
    return this._compute(kps);
  }

  _push(arr, val) {
    arr.push(val);
    if (arr.length > this.bufferSize) arr.shift();
  }

  _calibrateHeight(kps) {
    const nose = kps[NOSE], lAnkle = kps[L_ANKLE], rAnkle = kps[R_ANKLE];
    if (nose.score > 0.3 && lAnkle.score > 0.3 && rAnkle.score > 0.3) {
      const ankleY = Math.max(lAnkle.y, rAnkle.y);
      const h = ankleY - nose.y;
      if (h > 50) {
        this.heightSamples.push(h);
        if (this.heightSamples.length > 60) this.heightSamples.shift();
        const medH = this._median(this.heightSamples);
        this.pxPerMeter = medH / 1.65;
      }
    }
  }

  _compute(kps) {
    const m = {};

    // 1) Gait speed
    let speedPxF = 0;
    if (this.hipHistory.length > 10) {
      const disps = [];
      for (let i = 1; i < this.hipHistory.length; i++) {
        const dx = this.hipHistory[i][0] - this.hipHistory[i-1][0];
        const dy = this.hipHistory[i][1] - this.hipHistory[i-1][1];
        disps.push(Math.sqrt(dx*dx + dy*dy));
      }
      const sorted = [...disps].sort((a,b) => a-b);
      const q1 = Math.floor(sorted.length * 0.25);
      const q3 = Math.floor(sorted.length * 0.75);
      const steady = sorted.slice(q1, q3);
      speedPxF = steady.length > 0 ? steady.reduce((a,b)=>a+b,0)/steady.length : 0;
    }
    m.gaitSpeedPxF = speedPxF;
    m.gaitSpeedMps = this.pxPerMeter && this.pxPerMeter > 0
      ? (speedPxF * this.fps / this.pxPerMeter) : 0;

    // 2) Stride detection
    const lPeaks = this._findPeaks(this.lAnkleY);
    const rPeaks = this._findPeaks(this.rAnkleY);

    const lStrides = this._intervals(lPeaks);
    const rStrides = this._intervals(rPeaks);
    const allStrides = [...lStrides, ...rStrides];
    m.strideTime = 0;
    m.cadence = 0;
    if (allStrides.length > 0) {
      const med = this._median(allStrides);
      const valid = allStrides.filter(s => s > med*0.5 && s < med*1.5);
      if (valid.length > 0) {
        const avg = valid.reduce((a,b)=>a+b,0) / valid.length;
        m.strideTime = avg / this.fps;
        if (m.strideTime > 0) {
          const cad = 120 / m.strideTime;
          if (cad >= 50 && cad <= 160) m.cadence = cad;
        }
        valid.forEach(v => {
          this.strideTimesHist.push(v / this.fps);
          if (this.strideTimesHist.length > 30) this.strideTimesHist.shift();
        });
      }
    }

    // Step length
    const allPeaksSorted = [...lPeaks, ...rPeaks].sort((a,b) => a-b);
    m.stepLength = 0;
    if (allPeaksSorted.length > 1 && this.kpBuffer.length > 0) {
      const lSet = new Set(lPeaks);
      const stepVals = [];
      for (let i = 0; i < allPeaksSorted.length - 1; i++) {
        const f1 = allPeaksSorted[i], f2 = allPeaksSorted[i+1];
        const j1 = lSet.has(f1) ? L_ANKLE : R_ANKLE;
        const j2 = lSet.has(f2) ? L_ANKLE : R_ANKLE;
        const bi = Math.min(f1, this.kpBuffer.length - 1);
        const bi2 = Math.min(f2, this.kpBuffer.length - 1);
        if (bi >= 0 && bi2 >= 0 && this.kpBuffer[bi] && this.kpBuffer[bi2]) {
          const dx = this.kpBuffer[bi2][j2].x - this.kpBuffer[bi][j1].x;
          stepVals.push(Math.abs(dx));
        }
      }
      if (stepVals.length > 0) {
        m.stepLength = stepVals.reduce((a,b)=>a+b,0) / stepVals.length;
      }
    }

    // Symmetry
    m.symmetry = 0;
    if (lStrides.length > 0 && rStrides.length > 0) {
      const lm = lStrides.reduce((a,b)=>a+b,0)/lStrides.length;
      const rm = rStrides.reduce((a,b)=>a+b,0)/rStrides.length;
      const den = lm + rm;
      if (den > 0) m.symmetry = Math.min(2 * Math.abs(rm-lm)/den * 100, 50);
    }

    // Variability (CV%)
    m.variability = 0;
    if (this.strideTimesHist.length >= 3) {
      const arr = this.strideTimesHist;
      const mean = arr.reduce((a,b)=>a+b,0)/arr.length;
      if (mean > 0) {
        const std = Math.sqrt(arr.reduce((a,b)=>a+(b-mean)*(b-mean),0)/arr.length);
        m.variability = (std / mean) * 100;
      }
    }

    // 3) Joint angles
    m.hipAngleL = this._angle3(kps[L_SHOULDER], kps[L_HIP], kps[L_KNEE]);
    m.hipAngleR = this._angle3(kps[R_SHOULDER], kps[R_HIP], kps[R_KNEE]);
    m.kneeAngleL = this._angle3(kps[L_HIP], kps[L_KNEE], kps[L_ANKLE]);
    m.kneeAngleR = this._angle3(kps[R_HIP], kps[R_KNEE], kps[R_ANKLE]);

    // Trunk lean
    const sMid = {x:(kps[L_SHOULDER].x+kps[R_SHOULDER].x)/2, y:(kps[L_SHOULDER].y+kps[R_SHOULDER].y)/2};
    const hMid = {x:(kps[L_HIP].x+kps[R_HIP].x)/2, y:(kps[L_HIP].y+kps[R_HIP].y)/2};
    const tx = sMid.x - hMid.x, ty = sMid.y - hMid.y;
    const tLen = Math.sqrt(tx*tx + ty*ty) + 1e-8;
    const cosA = (tx*0 + ty*(-1)) / tLen;
    m.trunkLean = Math.acos(Math.max(-1, Math.min(1, cosA))) * 180 / Math.PI;

    // 4) Gait phases
    const n = Math.min(this.lAnkleY.length, this.rAnkleY.length);
    const lSlice = this.lAnkleY.slice(-n);
    const rSlice = this.rAnkleY.slice(-n);
    const lThresh = this._median(lSlice);
    const rThresh = this._median(rSlice);
    let stanceN = 0, doubleN = 0;
    for (let i = 0; i < n; i++) {
      const ls = lSlice[i] >= lThresh, rs = rSlice[i] >= rThresh;
      if (ls || rs) stanceN++;
      if (ls && rs) doubleN++;
    }
    m.stancePct = (stanceN / n) * 100;
    m.swingPct = 100 - m.stancePct;
    m.doubleSupportPct = (doubleN / n) * 100;

    // Status
    let warnCount = 0;
    if (m.symmetry > 10) warnCount += 2;
    else if (m.symmetry > 5) warnCount += 1;
    if (m.variability > 8) warnCount += 2;
    else if (m.variability > 5) warnCount += 1;
    if (m.cadence > 0 && (m.cadence < 90 || m.cadence > 130)) warnCount += 1;
    m.status = warnCount >= 3 ? 'warning' : warnCount >= 1 ? 'caution' : 'normal';

    return m;
  }

  _findPeaks(arr) {
    if (arr.length < 10) return [];
    const minDist = Math.floor(this.fps * 0.35);
    const range = Math.max(...arr) - Math.min(...arr);
    const prom = Math.max(8, range * 0.15);
    const peaks = [];
    for (let i = 1; i < arr.length - 1; i++) {
      if (arr[i] > arr[i-1] && arr[i] > arr[i+1]) {
        const leftMin = Math.min(...arr.slice(Math.max(0, i-minDist), i));
        const rightMin = Math.min(...arr.slice(i+1, Math.min(arr.length, i+minDist+1)));
        const p = arr[i] - Math.max(leftMin, rightMin);
        if (p >= prom) peaks.push(i);
      }
    }
    const filtered = [];
    for (const p of peaks) {
      if (filtered.length === 0 || p - filtered[filtered.length-1] >= minDist) {
        filtered.push(p);
      }
    }
    return filtered;
  }

  _intervals(peaks) {
    const r = [];
    for (let i = 1; i < peaks.length; i++) r.push(peaks[i] - peaks[i-1]);
    return r;
  }

  _angle3(p1, p2, p3) {
    if (p1.score < 0.3 || p2.score < 0.3 || p3.score < 0.3) return 0;
    const v1x = p1.x-p2.x, v1y = p1.y-p2.y;
    const v2x = p3.x-p2.x, v2y = p3.y-p2.y;
    const dot = v1x*v2x + v1y*v2y;
    const l1 = Math.sqrt(v1x*v1x+v1y*v1y)+1e-8;
    const l2 = Math.sqrt(v2x*v2x+v2y*v2y)+1e-8;
    const cos = Math.max(-1, Math.min(1, dot/(l1*l2)));
    return Math.acos(cos) * 180 / Math.PI;
  }

  _median(arr) {
    if (arr.length === 0) return 0;
    const s = [...arr].sort((a,b) => a-b);
    const m = Math.floor(s.length/2);
    return s.length % 2 ? s[m] : (s[m-1]+s[m])/2;
  }

  reset() {
    this.hipHistory = [];
    this.lAnkleY = [];
    this.rAnkleY = [];
    this.lAnkleX = [];
    this.rAnkleX = [];
    this.shoulderCX = [];
    this.kpBuffer = [];
    this.strideTimesHist = [];
    this.heightSamples = [];
    this.pxPerMeter = null;
    this.frameCount = 0;
  }
}

// ── Main App ──
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const startScreen = document.getElementById('start-screen');
const startBtn = document.getElementById('start-btn');
const loadingText = document.getElementById('loading-text');
const guide = document.getElementById('guide');
const stopBtn = document.getElementById('stop-btn');
const resultScreen = document.getElementById('result-screen');
const resultCanvas = document.getElementById('result-canvas');
const saveImgBtn = document.getElementById('save-img-btn');
const restartBtn = document.getElementById('restart-btn');
const zoomIndicator = document.getElementById('zoom-indicator');
const videoCanvasWrap = document.getElementById('video-canvas-wrap');

let detector = null;
let analyzer = new GaitAnalyzer();
let animId = null;
let lastTime = performance.now();
let fpsSmooth = 0;
let trailPts = [];
let currentStream = null;
let analysisStartTime = null;
let lastMetrics = null;

// Best frame tracking
let bestFrameScore = 0;
let bestFrameKeypoints = null;
let bestFrameImageData = null;
let lastBestCaptureTime = 0;

// Ankle trail
const MAX_TRAIL = 50;

// ── Pinch Zoom State ──
let currentZoom = 1.0;
const MIN_ZOOM = 1.0;
const MAX_ZOOM = 5.0;
let nativeZoomSupported = false;
let nativeZoomMin = 1;
let nativeZoomMax = 1;
let pinchStartDist = 0;
let pinchStartZoom = 1.0;
let zoomHideTimer = null;

function showZoomLevel() {
  zoomIndicator.textContent = currentZoom.toFixed(1) + 'x';
  zoomIndicator.classList.add('show');
  clearTimeout(zoomHideTimer);
  zoomHideTimer = setTimeout(() => zoomIndicator.classList.remove('show'), 1200);
}

function getTouchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function applyZoom(zoom) {
  currentZoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom));

  if (nativeZoomSupported && currentStream) {
    const track = currentStream.getVideoTracks()[0];
    const nativeZoom = nativeZoomMin + (currentZoom - MIN_ZOOM) / (MAX_ZOOM - MIN_ZOOM) * (nativeZoomMax - nativeZoomMin);
    try {
      track.applyConstraints({ advanced: [{ zoom: Math.min(nativeZoom, nativeZoomMax) }] });
    } catch(e) {
      videoCanvasWrap.style.transform = `scale(${currentZoom})`;
    }
  } else {
    // CSS transform fallback
    videoCanvasWrap.style.transform = `scale(${currentZoom})`;
  }
  showZoomLevel();
}

// Touch event handlers for pinch zoom
document.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    pinchStartDist = getTouchDist(e.touches);
    pinchStartZoom = currentZoom;
  }
}, { passive: false });

document.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const dist = getTouchDist(e.touches);
    const scale = dist / pinchStartDist;
    applyZoom(pinchStartZoom * scale);
  }
}, { passive: false });

document.addEventListener('touchend', (e) => {
  if (e.touches.length < 2) {
    pinchStartDist = 0;
  }
}, { passive: true });

// ── Orientation Change Handler ──
let resizeDebounceTimer = null;
function handleOrientationChange() {
  clearTimeout(resizeDebounceTimer);
  resizeDebounceTimer = setTimeout(() => {
    const w = video.videoWidth, h = video.videoHeight;
    if (w && h && (canvas.width !== w || canvas.height !== h)) {
      canvas.width = w;
      canvas.height = h;
    }
  }, 400);
}

if (screen.orientation) {
  screen.orientation.addEventListener('change', handleOrientationChange);
} else {
  window.addEventListener('orientationchange', handleOrientationChange);
}
window.addEventListener('resize', handleOrientationChange);

// ── Camera Start ──
startBtn.addEventListener('click', async () => {
  startBtn.disabled = true;
  startBtn.textContent = '로딩 중...';
  loadingText.style.display = 'block';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    currentStream = stream;
    video.srcObject = stream;
    await video.play();

    const track = stream.getVideoTracks()[0];
    const settings = track.getSettings();
    if (settings.frameRate) analyzer.fps = settings.frameRate;

    // Check native zoom support
    const caps = track.getCapabilities ? track.getCapabilities() : {};
    if (caps.zoom) {
      nativeZoomSupported = true;
      nativeZoomMin = caps.zoom.min || 1;
      nativeZoomMax = caps.zoom.max || 1;
    }

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    // Load MoveNet
    loadingText.textContent = 'MoveNet Lightning 로딩 중...';
    const model = poseDetection.SupportedModels.MoveNet;
    detector = await poseDetection.createDetector(model, {
      modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING,
    });

    startScreen.classList.add('hidden');
    stopBtn.style.display = 'block';
    guide.classList.add('show');
    setTimeout(() => guide.classList.remove('show'), 4000);

    analysisStartTime = performance.now();
    bestFrameScore = 0;
    bestFrameKeypoints = null;
    bestFrameImageData = null;
    lastBestCaptureTime = 0;

    detect();
  } catch(e) {
    alert('카메라/모델 오류: ' + e.message);
    startBtn.disabled = false;
    startBtn.textContent = '재시도';
    loadingText.style.display = 'none';
  }
});

// ── Detection Loop ──
async function detect() {
  if (!detector) return;

  let poses;
  try {
    poses = await detector.estimatePoses(video);
  } catch(e) {
    console.error('탐지 오류:', e);
    animId = null;
    return;
  }
  const now = performance.now();
  const dt = now - lastTime;
  lastTime = now;
  fpsSmooth = fpsSmooth * 0.9 + (1000/dt) * 0.1;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let metrics = null;
  if (poses.length > 0 && poses[0].keypoints) {
    const kps = poses[0].keypoints;
    drawSkeleton(kps);
    metrics = analyzer.update(kps);

    // Track best skeleton frame (throttled capture: max once per 2s)
    const frameScore = kps.reduce((sum, kp) => sum + kp.score, 0);
    if (frameScore > bestFrameScore) {
      bestFrameScore = frameScore;
      bestFrameKeypoints = kps.map(kp => ({...kp}));
      const captureNow = performance.now();
      if (captureNow - lastBestCaptureTime > 2000) {
        lastBestCaptureTime = captureNow;
        try {
          bestFrameImageData = canvas.toDataURL('image/png');
        } catch(e) { console.warn('toDataURL 실패:', e); }
      }
    }
  }

  if (metrics) lastMetrics = metrics;

  const elapsed = analysisStartTime ? (now - analysisStartTime) / 1000 : 0;
  updateUI(metrics, fpsSmooth, elapsed);
  animId = requestAnimationFrame(detect);
}

function drawSkeleton(kps) {
  for (const [i, j] of SKELETON) {
    const p1 = kps[i], p2 = kps[j];
    if (p1.score > 0.3 && p2.score > 0.3) {
      const c = getJointColor(Math.max(i, j));
      ctx.strokeStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
      ctx.lineWidth = i >= L_HIP && j >= L_HIP ? 4 : 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.stroke();
    }
  }

  for (let i = 0; i < 17; i++) {
    const p = kps[i];
    if (p.score > 0.3) {
      const c = getJointColor(i);
      const r = i >= L_HIP ? 7 : 5;
      ctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, r, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }

  // Ankle trail
  const la = kps[L_ANKLE];
  if (la.score > 0.3) {
    trailPts.push({x: la.x, y: la.y});
    if (trailPts.length > MAX_TRAIL) trailPts.shift();
  }
  for (let i = 1; i < trailPts.length; i++) {
    const a = i / trailPts.length;
    ctx.strokeStyle = `rgba(${Math.floor(50+200*a)},${Math.floor(100*(1-a))},${Math.floor(255*a)},${a})`;
    ctx.lineWidth = Math.max(1, Math.floor(3*a));
    ctx.beginPath();
    ctx.moveTo(trailPts[i-1].x, trailPts[i-1].y);
    ctx.lineTo(trailPts[i].x, trailPts[i].y);
    ctx.stroke();
  }
}

function formatDuration(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${s.toString().padStart(2, '0')}`;
}

function updateUI(m, fps, elapsed) {
  document.getElementById('fps-badge').textContent = `${Math.round(fps)} FPS`;
  document.getElementById('m-duration').textContent = elapsed > 0 ? formatDuration(elapsed) : '--';

  if (!m) return;

  const si = getSpeedInfo(m.gaitSpeedMps);
  document.getElementById('speed-value').textContent = m.gaitSpeedMps > 0 ? m.gaitSpeedMps.toFixed(2) : '--';
  document.getElementById('speed-value').style.color = si.color;
  document.getElementById('speed-label').textContent = `WHO-ICOPE: ${si.label}`;
  document.getElementById('speed-label').style.color = si.color;

  const pct = Math.min(m.gaitSpeedMps / 2.0 * 100, 100);
  document.getElementById('speed-marker').style.left = pct + '%';

  const statusColors = { normal: '#32cd32', caution: '#ffcc00', warning: '#ff3333' };
  document.getElementById('status-bar').style.background = statusColors[m.status] || '#888';

  document.getElementById('m-cadence').textContent = m.cadence > 0 ? `${m.cadence.toFixed(0)} spm` : '--';
  document.getElementById('m-stride-time').textContent = m.strideTime > 0 ? `${m.strideTime.toFixed(2)} s` : '--';
  document.getElementById('m-step-length').textContent = m.stepLength > 0 ? `${m.stepLength.toFixed(0)} px` : '--';
  document.getElementById('m-symmetry').textContent = `${m.symmetry.toFixed(1)} %`;
  document.getElementById('m-variability').textContent = `${m.variability.toFixed(1)} CV%`;
  document.getElementById('m-trunk').textContent = `${m.trunkLean.toFixed(1)} deg`;
  document.getElementById('m-knee').textContent = `${m.kneeAngleL.toFixed(0)} / ${m.kneeAngleR.toFixed(0)} deg`;
  document.getElementById('m-hip').textContent = `${m.hipAngleL.toFixed(0)} / ${m.hipAngleR.toFixed(0)} deg`;
  document.getElementById('m-stance').textContent = `${m.stancePct.toFixed(1)} %`;
  document.getElementById('m-swing').textContent = `${m.swingPct.toFixed(1)} %`;
  document.getElementById('m-double').textContent = `${m.doubleSupportPct.toFixed(1)} %`;
}

// ── Stop & Save (분석 종료) ──
stopBtn.addEventListener('click', async () => {
  // Stop detection loop
  if (animId) {
    cancelAnimationFrame(animId);
    animId = null;
  }

  const elapsed = analysisStartTime ? (performance.now() - analysisStartTime) / 1000 : 0;
  stopBtn.style.display = 'none';

  // Build result image (await render completion before showing)
  await renderResultImage(elapsed);
  resultScreen.classList.add('active');
});

async function renderResultImage(elapsed) {
  const rc = resultCanvas;
  const rctx = rc.getContext('2d');
  const W = 720, skeletonH = 540;
  const reportLines = buildReportLines(elapsed);
  const lineH = 32;
  const reportH = reportLines.length * lineH + 60;
  const totalH = skeletonH + reportH;
  rc.width = W;
  rc.height = totalH;

  // Background
  rctx.fillStyle = '#0a0a1a';
  rctx.fillRect(0, 0, W, totalH);

  // Draw best skeleton frame image or fallback
  if (bestFrameImageData) {
    await new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        try { rctx.drawImage(video, 0, 0, W, skeletonH); } catch(e) {
          rctx.fillStyle = '#1a1a2e'; rctx.fillRect(0, 0, W, skeletonH);
        }
        rctx.drawImage(img, 0, 0, W, skeletonH);
        resolve();
      };
      img.onerror = reject;
      img.src = bestFrameImageData;
    });
  } else {
    try { rctx.drawImage(video, 0, 0, W, skeletonH); } catch(e) {
      rctx.fillStyle = '#1a1a2e'; rctx.fillRect(0, 0, W, skeletonH);
      rctx.fillStyle = '#888'; rctx.font = '18px sans-serif'; rctx.textAlign = 'center';
      rctx.fillText('영상 캡처 불가 (보안 제한)', W / 2, skeletonH / 2);
    }
    if (bestFrameKeypoints) {
      drawSkeletonOnContext(rctx, bestFrameKeypoints, W, skeletonH);
    }
  }
  drawReportText(rctx, reportLines, W, skeletonH, lineH);
}

function drawSkeletonOnContext(rctx, kps, w, h) {
  const sx = w / canvas.width;
  const sy = h / canvas.height;
  for (const [i, j] of SKELETON) {
    const p1 = kps[i], p2 = kps[j];
    if (p1.score > 0.3 && p2.score > 0.3) {
      const c = getJointColor(Math.max(i, j));
      rctx.strokeStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
      rctx.lineWidth = 4;
      rctx.lineCap = 'round';
      rctx.beginPath();
      rctx.moveTo(p1.x * sx, p1.y * sy);
      rctx.lineTo(p2.x * sx, p2.y * sy);
      rctx.stroke();
    }
  }
  for (let i = 0; i < 17; i++) {
    const p = kps[i];
    if (p.score > 0.3) {
      const c = getJointColor(i);
      rctx.fillStyle = `rgb(${c[0]},${c[1]},${c[2]})`;
      rctx.beginPath();
      rctx.arc(p.x * sx, p.y * sy, 6, 0, Math.PI*2);
      rctx.fill();
      rctx.strokeStyle = '#fff';
      rctx.lineWidth = 2;
      rctx.stroke();
    }
  }
}

function buildReportLines(elapsed) {
  const m = lastMetrics;
  const lines = [];
  lines.push({ text: 'Dignif-Eye 보행 분석 결과', color: '#64c8ff', size: 26, bold: true });
  lines.push({ text: '', color: '', size: 10 });

  if (m) {
    const si = getSpeedInfo(m.gaitSpeedMps);
    lines.push({ text: `보행 속도: ${m.gaitSpeedMps > 0 ? m.gaitSpeedMps.toFixed(2) : '--'} m/s  (WHO-ICOPE: ${si.label})`, color: si.color, size: 22, bold: true });
    lines.push({ text: '', color: '', size: 8 });
    lines.push({ text: '[ 시공간 지표 ]', color: '#64c8ff', size: 20 });
    lines.push({ text: `분당 걸음수: ${m.cadence > 0 ? m.cadence.toFixed(0) + ' spm' : '--'}`, color: '#dde', size: 20 });
    lines.push({ text: `보폭 시간: ${m.strideTime > 0 ? m.strideTime.toFixed(2) + ' s' : '--'}`, color: '#dde', size: 20 });
    lines.push({ text: `보폭 길이: ${m.stepLength > 0 ? m.stepLength.toFixed(0) + ' px' : '--'}`, color: '#dde', size: 20 });
    lines.push({ text: `대칭성: ${m.symmetry.toFixed(1)} %`, color: '#dde', size: 20 });
    lines.push({ text: `변동성: ${m.variability.toFixed(1)} CV%`, color: '#dde', size: 20 });
    lines.push({ text: '', color: '', size: 8 });
    lines.push({ text: '[ 운동학 지표 ]', color: '#64c8ff', size: 20 });
    lines.push({ text: `체간 기울기: ${m.trunkLean.toFixed(1)} deg`, color: '#dde', size: 20 });
    lines.push({ text: `무릎 각도 (좌/우): ${m.kneeAngleL.toFixed(0)} / ${m.kneeAngleR.toFixed(0)} deg`, color: '#dde', size: 20 });
    lines.push({ text: `고관절 각도 (좌/우): ${m.hipAngleL.toFixed(0)} / ${m.hipAngleR.toFixed(0)} deg`, color: '#dde', size: 20 });
    lines.push({ text: '', color: '', size: 8 });
    lines.push({ text: '[ 보행 주기 ]', color: '#64c8ff', size: 20 });
    lines.push({ text: `입각기: ${m.stancePct.toFixed(1)} %`, color: '#dde', size: 20 });
    lines.push({ text: `유각기: ${m.swingPct.toFixed(1)} %`, color: '#dde', size: 20 });
    lines.push({ text: `양하지 지지: ${m.doubleSupportPct.toFixed(1)} %`, color: '#dde', size: 20 });
  } else {
    lines.push({ text: '분석 데이터 없음', color: '#888', size: 20 });
  }

  lines.push({ text: '', color: '', size: 8 });
  lines.push({ text: `측정 시간: ${formatDuration(elapsed)}`, color: '#a0a0c0', size: 20 });
  return lines;
}

function drawReportText(rctx, lines, W, startY, lineH) {
  let y = startY + 30;
  for (const line of lines) {
    if (!line.text) { y += line.size || 8; continue; }
    const fontSize = line.size || 20;
    rctx.font = `${line.bold ? 'bold ' : ''}${fontSize}px -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif`;
    rctx.fillStyle = line.color || '#dde';
    rctx.textAlign = 'left';
    rctx.fillText(line.text, 24, y);
    y += lineH;
  }
}

// ── Save Image ──
saveImgBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = `dignif-eye-result-${Date.now()}.png`;
  link.href = resultCanvas.toDataURL('image/png');
  link.click();
});

// ── Restart ──
restartBtn.addEventListener('click', () => {
  resultScreen.classList.remove('active');

  // Reset state
  analyzer.reset();
  trailPts = [];
  lastMetrics = null;
  bestFrameScore = 0;
  bestFrameKeypoints = null;
  bestFrameImageData = null;
  lastBestCaptureTime = 0;
  analysisStartTime = performance.now();
  lastTime = performance.now();
  fpsSmooth = 0;
  currentZoom = 1.0;
  videoCanvasWrap.style.transform = '';

  // Reset UI values
  document.getElementById('speed-value').textContent = '--';
  document.getElementById('speed-value').style.color = '';
  document.getElementById('speed-label').textContent = '대기 중...';
  document.getElementById('speed-label').style.color = '#888';
  document.getElementById('speed-marker').style.left = '0%';
  document.getElementById('status-bar').style.background = '#888';
  document.getElementById('m-cadence').textContent = '--';
  document.getElementById('m-stride-time').textContent = '--';
  document.getElementById('m-step-length').textContent = '--';
  document.getElementById('m-symmetry').textContent = '--';
  document.getElementById('m-variability').textContent = '--';
  document.getElementById('m-duration').textContent = '--';
  document.getElementById('m-trunk').textContent = '--';
  document.getElementById('m-knee').textContent = '--';
  document.getElementById('m-hip').textContent = '--';
  document.getElementById('m-stance').textContent = '--';
  document.getElementById('m-swing').textContent = '--';
  document.getElementById('m-double').textContent = '--';

  stopBtn.style.display = 'block';
  detect();
});
